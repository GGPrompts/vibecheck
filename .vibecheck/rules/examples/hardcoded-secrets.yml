- id: hardcoded-api-key
  name: Hardcoded API Key
  pattern: const $NAME = "sk-$$$"
  language: typescript
  severity: critical
  message: >-
    String literal starting with "sk-" assigned to a variable, which may be
    a hardcoded API key or secret token. Secrets in source code can be
    leaked through version control.
  suggestion: >-
    Move secrets to environment variables or a secrets manager (e.g., AWS
    Secrets Manager, Vault). Access via process.env at runtime.
  category: security

- id: hardcoded-password-const
  name: Hardcoded Password Assignment
  pattern: const password = $VALUE
  language: typescript
  severity: high
  message: >-
    A variable named "password" is assigned a value directly. If this is
    a credential, it should never be hardcoded in source code.
  suggestion: >-
    Use environment variables (process.env.PASSWORD) or a secrets manager.
    For test fixtures, clearly mark them as test-only and keep them out of
    production code paths.
  category: security

- id: hardcoded-secret-const
  name: Hardcoded Secret Assignment
  pattern: const secret = $VALUE
  language: typescript
  severity: high
  message: >-
    A variable named "secret" is assigned a value directly. This may be
    a hardcoded secret that should be externalized.
  suggestion: >-
    Store secrets in environment variables or a dedicated secrets manager.
    Never commit secrets to version control.
  category: security
